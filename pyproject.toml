[project]
name = "puppibuff"
version = "0.0.0"
dependencies = [
    "numpy",
    "matplotlib",
    "xgboost",
    "joblib",
    "tqdm",
    "tqdm-joblib",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.setuptools]
package-dir = {"" = "src"}
packages = [
    "puppibuff", 
    "puppibuff.datasets", 
    "puppibuff.codecs", 
    "puppibuff.validation"
]

[tool.mypy]
disable_error_code = ["import-untyped"]